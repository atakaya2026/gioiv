<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>အတကယ သုံးသပ်ချက်များ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #2563eb;
            --dark: #0f172a;
            --light: #f8fafc;
        }
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--light); color: var(--dark); }

        .card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            padding: 1.5rem;
            transition: box-shadow 0.2s;
        }
        .card:hover { box-shadow: 0 4px 24px rgba(37,99,235,0.08); }

        .badge-mobile {
            background: #dbeafe; color: #1d4ed8;
            font-size: 0.7rem; font-weight: 700;
            padding: 2px 10px; border-radius: 999px;
        }
        .badge-pc {
            background: #dcfce7; color: #15803d;
            font-size: 0.7rem; font-weight: 700;
            padding: 2px 10px; border-radius: 999px;
        }
        .badge-challenge {
            background: #fef9c3; color: #854d0e;
            font-size: 0.7rem; font-weight: 700;
            padding: 2px 10px; border-radius: 999px;
            border: 1px solid #fcd34d;
        }

        .btn-primary {
            background: var(--blue); color: white;
            padding: 0.75rem 1.5rem; border-radius: 0.75rem;
            font-weight: 700; border: none; cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-secondary {
            background: white; color: var(--dark);
            padding: 0.75rem 1.5rem; border-radius: 0.75rem;
            font-weight: 700; border: 1px solid #e2e8f0; cursor: pointer;
            transition: all 0.2s;
        }
        .btn-secondary:hover { border-color: var(--blue); color: var(--blue); }

        .form-input {
            width: 100%; border: 1px solid #e2e8f0; border-radius: 0.6rem;
            padding: 0.75rem 1rem; font-size: 0.95rem; outline: none;
            transition: border-color 0.2s;
            font-family: 'Noto Sans KR', sans-serif;
        }
        .form-input:focus { border-color: var(--blue); }

        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(15,23,42,0.5);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: white; border-radius: 1.25rem;
            padding: 2rem; width: 90%; max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }

        .skeleton {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 0.5rem;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .empty-state {
            text-align: center; padding: 4rem 2rem; color: #94a3b8;
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }

        .toast {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
            background: var(--dark); color: white;
            padding: 0.75rem 1.5rem; border-radius: 999px;
            font-size: 0.9rem; font-weight: 500;
            opacity: 0; transition: opacity 0.3s;
            z-index: 200; pointer-events: none;
        }
        .toast.show { opacity: 1; }

        .review-content {
            font-size: 1rem; line-height: 1.8; color: #334155;
            word-break: break-all;
        }
        .review-meta {
            font-size: 0.78rem; color: #94a3b8; margin-top: 0.75rem;
        }
        .review-nickname {
            font-weight: 700; color: #475569; margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>

<!-- 네비게이션 -->
<nav style="position:sticky;top:0;z-index:50;background:rgba(248,250,252,0.9);backdrop-filter:blur(12px);border-bottom:1px solid #e2e8f0;">
    <div style="max-width:720px;margin:0 auto;padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;">
        <a href="index.html" style="display:flex;align-items:center;gap:0.5rem;text-decoration:none;">
            <img src="images/logotype.png" alt="atakaya" style="height:2.2rem;">
        </a>
        <span style="font-size:0.85rem;color:#64748b;font-weight:500;">သုံးသပ်ချက်များ</span>
    </div>
</nav>

<!-- 헤더 -->
<div style="max-width:720px;margin:0 auto;padding:3rem 1.5rem 1.5rem;">
    <h1 style="font-size:1.8rem;font-weight:900;margin-bottom:0.5rem;">အတကယ သုံးသပ်ချက်များ</h1>
    <p style="color:#64748b;font-size:0.95rem;">အတကယကို စမ်းသုံးကြည့်ပြီး သင်၏ထင်မြင်ချက်ကို မျှဝေပါ။</p>
</div>

<!-- 글쓰기 버튼 영역 -->
<div style="max-width:720px;margin:0 auto;padding:0 1.5rem 2rem;display:flex;gap:0.75rem;flex-wrap:wrap;">
    <button class="btn-primary" onclick="goToDemo()">✏️ သုံးသပ်ချက် ရေးသားရန်</button>
</div>

<!-- 게시글 목록 -->
<div id="reviewList" style="max-width:720px;margin:0 auto;padding:0 1.5rem 4rem;display:flex;flex-direction:column;gap:1rem;">
    <!-- 스켈레톤 -->
    <div class="card">
        <div class="skeleton" style="height:1rem;width:40%;margin-bottom:0.75rem;"></div>
        <div class="skeleton" style="height:0.8rem;width:100%;margin-bottom:0.4rem;"></div>
        <div class="skeleton" style="height:0.8rem;width:80%;"></div>
    </div>
    <div class="card">
        <div class="skeleton" style="height:1rem;width:30%;margin-bottom:0.75rem;"></div>
        <div class="skeleton" style="height:0.8rem;width:100%;margin-bottom:0.4rem;"></div>
        <div class="skeleton" style="height:0.8rem;width:60%;"></div>
    </div>
</div>

<!-- 글쓰기 모달 -->
<div class="modal-overlay" id="writeModal">
    <div class="modal">
        <h2 style="font-size:1.2rem;font-weight:800;margin-bottom:1.5rem;">✏️ သုံးသပ်ချက် ရေးသားရန်</h2>

        <div style="margin-bottom:1rem;">
            <label style="font-size:0.85rem;font-weight:600;color:#475569;display:block;margin-bottom:0.4rem;">အမည် (ရွေးချယ်နိုင်သည်)</label>
            <input type="text" id="inputNickname" class="form-input" placeholder="အမည် သို့မဟုတ် နာမည်ဖျောက်">
        </div>

        <div style="margin-bottom:1rem;">
            <label style="font-size:0.85rem;font-weight:600;color:#475569;display:block;margin-bottom:0.4rem;">စက်အမျိုးအစား</label>
            <div style="display:flex;gap:0.5rem;">
                <button onclick="selectDevice('မိုဘိုင်း')" id="btnMobile" class="btn-secondary" style="flex:1;font-size:0.9rem;">📱 မိုဘိုင်း</button>
                <button onclick="selectDevice('PC')" id="btnPC" class="btn-secondary" style="flex:1;font-size:0.9rem;">💻 PC</button>
            </div>
        </div>

        <div style="margin-bottom:1.5rem;">
            <label style="font-size:0.85rem;font-weight:600;color:#475569;display:block;margin-bottom:0.4rem;">သုံးသပ်ချက် <span style="color:#ef4444;">*</span></label>
            <textarea id="inputContent" class="form-input" rows="5" placeholder="အတကယကို စမ်းသုံးကြည့်ပြီး သင်၏ထင်မြင်ချက်ကို ရေးပါ..."></textarea>
        </div>

        <div style="display:flex;gap:0.75rem;">
            <button class="btn-secondary" style="flex:1;" onclick="closeWriteModal()">မလုပ်တော့ပါ</button>
            <button class="btn-primary" style="flex:1;" onclick="submitReview()" id="submitBtn">တင်သွင်းရန်</button>
        </div>
    </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
    const SUPABASE_URL = 'https://aghsgfhcbvuwcaajtxhg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFnaHNnZmhjYnZ1d2NhYWp0eGhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1OTM1MjgsImV4cCI6MjA4ODE2OTUyOH0.Nrt59f9wvZ0K5KhheG26wgqhlY6DSsQ0Wy3eLL6Vlwg';

    let selectedDevice = '';

    // URL 파라미터 확인 (체험기에서 넘어온 경우)
    const urlParams = new URLSearchParams(window.location.search);
    const fromDemo = urlParams.get('from'); // 'mobile', 'pc', 'challenge'
    const prefillContent = urlParams.get('content') || '';

    function selectDevice(device) {
        selectedDevice = device;
        document.getElementById('btnMobile').style.borderColor = device === 'မိုဘိုင်း' ? '#2563eb' : '#e2e8f0';
        document.getElementById('btnMobile').style.color = device === 'မိုဘိုင်း' ? '#2563eb' : '';
        document.getElementById('btnPC').style.borderColor = device === 'PC' ? '#2563eb' : '#e2e8f0';
        document.getElementById('btnPC').style.color = device === 'PC' ? '#2563eb' : '';
    }

    function goToDemo() {
        const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
        location.href = isMobile ? 'mobile_demo.html' : 'pc_demo_windows.html';
    }

    function openWriteModal() {
        document.getElementById('writeModal').classList.add('open');
        // 체험기에서 넘어온 경우 자동 세팅
        if (fromDemo === 'mobile') selectDevice('မိုဘိုင်း');
        if (fromDemo === 'pc' || fromDemo === 'challenge') selectDevice('PC');
        if (prefillContent) document.getElementById('inputContent').value = decodeURIComponent(prefillContent);
    }

    function closeWriteModal() {
        document.getElementById('writeModal').classList.remove('open');
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function submitReview() {
        const content = document.getElementById('inputContent').value.trim();
        if (!content) { showToast('သုံးသပ်ချက်ကို ရေးပေးပါ။'); return; }

        const nickname = document.getElementById('inputNickname').value.trim() || 'မ익်မသိ';
        const device = selectedDevice || 'မသိ';
        const is_challenge = fromDemo === 'challenge';

        const btn = document.getElementById('submitBtn');
        btn.textContent = 'တင်နေသည်...';
        btn.disabled = true;

        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/reviews`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify({ nickname, content, device, is_challenge })
            });

            if (!res.ok) throw new Error();

            closeWriteModal();
            document.getElementById('inputNickname').value = '';
            document.getElementById('inputContent').value = '';
            selectedDevice = '';
            selectDevice('');
            showToast('✅ တင်သွင်းပြီးပါပြီ။ ကျေးဇူးတင်ပါသည်!');
            loadReviews();
        } catch {
            showToast('❌ အမှားတစ်ခု ဖြစ်ပွားသည်။ ထပ်မံကြိုးစားပါ။');
        } finally {
            btn.textContent = 'တင်သွင်းရန်';
            btn.disabled = false;
        }
    }

    function formatDate(dateStr) {
        const d = new Date(dateStr);
        return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
    }

    async function loadReviews() {
        const list = document.getElementById('reviewList');

        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/reviews?select=*&order=created_at.desc`, {
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`
                }
            });
            const data = await res.json();

            if (!data.length) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">💬</div>
                        <p style="font-weight:600;color:#475569;margin-bottom:0.5rem;">သုံးသပ်ချက်များ မရှိသေးပါ</p>
                        <p style="font-size:0.85rem;">အတကယကို စမ်းသုံးကြည့်ပြီး ပထမဦးဆုံး ထင်မြင်ချက်ကို မျှဝေပါ!</p>
                    </div>`;
                return;
            }

            list.innerHTML = data.map(r => `
                <div class="card">
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.75rem;">
                        <div class="review-nickname">${escapeHtml(r.nickname || 'မမည်သိ')}</div>
                        <div style="display:flex;gap:0.4rem;align-items:center;">
                            ${r.is_challenge ? '<span class="badge-challenge">👑 ကီးမပ်မပါ</span>' : ''}
                            <span class="${r.device === 'PC' ? 'badge-pc' : 'badge-mobile'}">${r.device === 'PC' ? '💻 PC' : '📱 မိုဘိုင်း'}</span>
                        </div>
                    </div>
                    <div class="review-content">${escapeHtml(r.content)}</div>
                    <div class="review-meta">${formatDate(r.created_at)}</div>
                </div>
            `).join('');

        } catch {
            list.innerHTML = `<div class="empty-state"><p>ဒေတာ ဖတ်ယူ၍ မရပါ။ ထပ်မံကြိုးစားပါ။</p></div>`;
        }
    }

    function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // 체험기에서 넘어온 경우 모달 자동 오픈
    if (fromDemo) {
        window.addEventListener('load', () => openWriteModal());
    }

    loadReviews();

    // 모달 바깥 클릭시 닫기
    document.getElementById('writeModal').addEventListener('click', function(e) {
        if (e.target === this) closeWriteModal();
    });
</script>

</body>
</html>
